name: Deploy WordPress to IONOS

on:
  push:
    branches:
      - Task

jobs:
  deploy:
    name: Upload wp-content via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass and rsync
        run: sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Deploy wp-content to IONOS
        run: |
          sshpass -p "${{ secrets.SFTP_PASSWORD }}" rsync -avz \
            --exclude='uploads/' \
            --exclude='cache/' \
            --exclude='.DS_Store' \
            -e "ssh -p 22 -o StrictHostKeyChecking=no" \
            ./wp-content/ \
            ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_SERVER }}:/public/wp-content/