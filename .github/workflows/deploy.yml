name: Deploy WordPress to IONOS

on:
  push:
    branches:
      - Task

jobs:
  deploy:
    name: Upload wp-content via SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy wp-content to IONOS via SFTP
        run: |
          lftp -u "${{ secrets.SFTP_USERNAME }}","${{ secrets.SFTP_PASSWORD }}" sftp://${{ secrets.SFTP_SERVER }} <<EOF
          set sftp:auto-confirm yes
          set net:timeout 20
          set net:max-retries 2
          set net:reconnect-interval-base 5

          mirror -R ./wp-content/ /public/wp-content/ \
            --only-newer \
            --parallel=2 \
            --exclude-glob uploads/ \
            --exclude-glob cache/

          bye
          EOF