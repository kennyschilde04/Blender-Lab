name: Deploy WordPress to IONOS

on:
  push:
    branches:
      - Task

jobs:
  deploy:
    name: Upload via SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to IONOS via SFTP
        run: |
          lftp -u "${{ secrets.SFTP_USERNAME }}","${{ secrets.SFTP_PASSWORD }}" sftp://${{ secrets.SFTP_SERVER }} <<EOF
          set sftp:auto-confirm yes
          mirror -R ./ /public/ \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob wp-config.php \
            --exclude-glob .htaccess \
            --exclude-glob php.ini
          bye
          EOF